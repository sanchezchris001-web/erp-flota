<!DOCTYPE html>
<html>
<head>
<title>ERP Flota PRO</title>

<style>
body{font-family:'Segoe UI';background:#f4f6fb;margin:0}

header{background:#111827;color:white;padding:15px 25px;display:flex;justify-content:space-between}

.container{padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}

.card{background:white;padding:20px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.08)}

button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;margin:2px}
.btn-blue{background:#2563eb;color:white}
.btn-green{background:#16a34a;color:white}
.btn-red{background:#dc2626;color:white}
.btn-gray{background:#6b7280;color:white}

input,select{width:100%;padding:6px;margin:4px 0;border-radius:6px;border:1px solid #ddd}
</style>
</head>

<body>

<header>
<div>🚛 ERP Flota PRO</div>

<div style="display:flex;gap:10px;align-items:center;">
<span>{{user.username}} ({{user.rol}})</span>
<button onclick="logout()" class="btn-red">Cerrar sesión</button>
</div>
</header>

<script>
const userRol = "{{user.rol}}";
</script>

<div class="container">
<div class="card">
<h3>📊 Dashboard</h3>

<p>👷 Conductores: <span id="cd"></span> / <span id="co"></span></p>
<p>🚛 Unidades: <span id="ud"></span> / <span id="uo"></span> / Inh: <span id="ui"></span></p>

<ul id="asignaciones"></ul>
</div>
</div>

<div class="container">
<div class="card">
<h3>Conductores</h3>
<ul id="conductores"></ul>
</div>

<div class="card">
<h3>Unidades</h3>
<ul id="unidades"></ul>
</div>
</div>

<div class="container" id="seccion-crear">
<div class="card">
<h3>Crear</h3>

<input id="nombre" placeholder="Conductor">
<button onclick="crearConductor()" class="btn-green">Agregar</button>

<input id="placa" placeholder="Unidad">
<button onclick="crearUnidad()" class="btn-green">Agregar</button>

</div>
</div>

<div class="container" id="seccion-editar">
<div class="card">
<h3>Editar Conductores</h3>

<select id="editConductorSelect"></select>
<input id="editConductorNombre">

<button onclick="editarConductor()" class="btn-blue">Guardar</button>
<button onclick="eliminarConductor()" class="btn-red">Eliminar</button>
</div>

<div class="card">
<h3>Editar Unidades</h3>

<select id="editUnidadSelect"></select>
<input id="editUnidadPlaca">

<button onclick="editarUnidad()" class="btn-blue">Guardar</button>
<button onclick="eliminarUnidad()" class="btn-red">Eliminar</button>
</div>
</div>

<div class="container" id="seccion-operaciones">
<div class="card">
<h3>Asignar</h3>

<select id="conductorSelect"></select>
<select id="unidadSelect"></select>

<button onclick="asignar()" class="btn-blue">Asignar</button>
</div>

<div class="card">
<h3>Finalizar</h3>

<select id="conductorFinal"></select>
<select id="unidadFinal"></select>

<button onclick="finalizar()" class="btn-gray">Finalizar</button>
</div>
</div>

<div class="container" id="seccion-historial">
<div class="card">
<h3>Historial</h3>
<ul id="movimientos"></ul>
</div>
</div>

<div class="container" id="seccion-usuarios">
<div class="card">
<h3>Usuarios</h3>

<input id="u_id" type="hidden">
<input id="u_user" placeholder="Usuario">
<input id="u_pass" placeholder="Password">

<select id="u_rol">
<option>admin</option>
<option>supervisor</option>
<option>user</option>
</select>

<button onclick="guardarUsuario()" class="btn-green">Guardar</button>

<ul id="listaUsuarios"></ul>
</div>
</div>

<script>

// ===== API SEGURA =====
function api(url,data={}){
return fetch(url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})
.then(r=>{
if(!r.ok) throw "Error servidor";
return r;
})
.catch(e=>alert(e));
}

// ===== UTIL =====
function logout(){ location.href="/logout"; }

function colorEstado(e){
if(e==="disponible") return "green";
if(e==="en_ruta"||e==="ocupada") return "orange";
if(e==="inhabilitado") return "red";
return "black";
}

function actualizarSelect(select, lista, key, label){
let v = select.value;
select.innerHTML = `<option value="">--</option>` + lista.map(i=>`<option value="${i[key]}">${i[label]}</option>`).join("");
if(v) select.value=v;
}

// ===== ELEMENTOS =====
const cd = document.getElementById("cd");
const co = document.getElementById("co");
const ud = document.getElementById("ud");
const uo = document.getElementById("uo");
const ui = document.getElementById("ui");

const conductores = document.getElementById("conductores");
const unidades = document.getElementById("unidades");
const movimientos = document.getElementById("movimientos");

const nombre = document.getElementById("nombre");
const placa = document.getElementById("placa");

const editConductorSelect = document.getElementById("editConductorSelect");
const editConductorNombre = document.getElementById("editConductorNombre");

const editUnidadSelect = document.getElementById("editUnidadSelect");
const editUnidadPlaca = document.getElementById("editUnidadPlaca");

const conductorSelect = document.getElementById("conductorSelect");
const unidadSelect = document.getElementById("unidadSelect");

const conductorFinal = document.getElementById("conductorFinal");
const unidadFinal = document.getElementById("unidadFinal");

const u_id = document.getElementById("u_id");
const u_user = document.getElementById("u_user");
const u_pass = document.getElementById("u_pass");
const u_rol = document.getElementById("u_rol");
const listaUsuarios = document.getElementById("listaUsuarios");

// ===== CARGAR =====
function cargar(){

fetch("/datos").then(r=>r.json()).then(d=>{

cd.innerText=d.stats.conductores_disponibles;
co.innerText=d.stats.conductores_ocupados;
ud.innerText=d.stats.unidades_disponibles;
uo.innerText=d.stats.unidades_ocupadas;
ui.innerText=d.stats.unidades_inhabilitadas;

conductores.innerHTML=d.conductores.map(c=>`
<li>${c.nombre} - <span style="color:${colorEstado(c.estado)}">${c.estado}</span></li>`).join("");

unidades.innerHTML=d.unidades.map(u=>`
<li>${u.placa} - <span style="color:${colorEstado(u.estado)}">${u.estado}</span></li>`).join("");

actualizarSelect(conductorSelect,d.conductores,"id","nombre");
actualizarSelect(unidadSelect,d.unidades,"id","placa");
actualizarSelect(conductorFinal,d.conductores,"id","nombre");
actualizarSelect(unidadFinal,d.unidades,"id","placa");
actualizarSelect(editConductorSelect,d.conductores,"id","nombre");
actualizarSelect(editUnidadSelect,d.unidades,"id","placa");

});

if(userRol==="admin"){
fetch("/movimientos").then(r=>r.json()).then(d=>{
movimientos.innerHTML=d.map(m=>`
<li><b>${m.accion}</b> - ${m.usuario} - ${m.fecha}</li>`).join("");
});

fetch("/usuarios").then(r=>r.json()).then(d=>{
listaUsuarios.innerHTML=d.map(u=>`
<li>${u.username} (${u.rol})
<button onclick="editarUsuario(${u.id},'${u.username}','${u.rol}')">✏️</button>
<button onclick="eliminarUsuario(${u.id})">❌</button>
</li>`).join("");
});
}

}

// ===== FUNCIONES =====
function crearConductor(){
if(!nombre.value.trim()) return alert("Nombre requerido");
api("/crear_conductor",{nombre:nombre.value}).then(cargar);
}

function crearUnidad(){
if(!placa.value.trim()) return alert("Placa requerida");
api("/crear_unidad",{placa:placa.value}).then(cargar);
}

function editarConductor(){
if(!editConductorSelect.value) return;
api("/editar_conductor",{id:editConductorSelect.value,nombre:editConductorNombre.value}).then(cargar);
}

function eliminarConductor(){
api("/eliminar_conductor",{id:editConductorSelect.value}).then(cargar);
}

function editarUnidad(){
if(!editUnidadSelect.value) return;
api("/editar_unidad",{id:editUnidadSelect.value,placa:editUnidadPlaca.value}).then(cargar);
}

function eliminarUnidad(){
api("/eliminar_unidad",{id:editUnidadSelect.value}).then(cargar);
}

function asignar(){
if(!conductorSelect.value||!unidadSelect.value) return alert("Seleccione datos");
api("/asignar",{conductor_id:conductorSelect.value,unidad_id:unidadSelect.value}).then(cargar);
}

function finalizar(){
api("/finalizar",{conductor_id:conductorFinal.value||null,unidad_id:unidadFinal.value||null}).then(cargar);
}

// usuarios
function editarUsuario(id,u,r){
u_id.value=id;u_user.value=u;u_rol.value=r;u_pass.value="";
}

function guardarUsuario(){
api(u_id.value?"/editar_usuario":"/crear_usuario",{
id:u_id.value,username:u_user.value,password:u_pass.value,rol:u_rol.value
}).then(()=>{u_id.value="";u_user.value="";u_pass.value="";cargar();});
}

function eliminarUsuario(id){
if(!confirm("Eliminar?")) return;
api("/eliminar_usuario",{id}).then(cargar);
}

// ===== ROLES =====
if(userRol==="user"){
document.getElementById("seccion-crear").style.display="none";
document.getElementById("seccion-editar").style.display="none";
document.getElementById("seccion-operaciones").style.display="none";
}
if(userRol!=="admin"){
document.getElementById("seccion-usuarios").style.display="none";
document.getElementById("seccion-historial").style.display="none";
}

// ===== INIT =====
setInterval(cargar,3000);
cargar();

</script>

</body>
</html>
